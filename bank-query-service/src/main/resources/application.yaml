spring:
  application:
    name: bank-query-service

  #MongoDB Configuration:
  data:
    mongodb:
      host: localhost
      port: 27017
      database: bank_query_db
      authentication-database: admin
      username: admin
      password: admin123

  #redis configuration for caching:
  redis:
    host: localhost
    port: 6379
    timeout: 2000
    database: 1
    jedis:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0

  #Kafka  Consumer Configuration:
  kafka:
    consumer:
      bootstrap-servers: localhost:9092
      group-id: bank-query-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
      max-poll-records: 100
      properties:
        isolation.level: read_committed
        session.timeout.ms: 30000
        heartbeat.interval.ms: 3000
        max.poll.interval.ms: 300000
    listener:
      ack-mode: manual
      poll-timeout: 3000

server:
  port: 5052

app:
  name: bank-query-service
  version: "1.0"
  kafka:
    topic: bank.account.events
    consumer:
      concurrency: 3 # Number of concurrent consumer threads
      retry:
        backoff-interval-ms: 2000 # Wait 2 seconds between retries
        max-attempts: 3 # Maximum retry attempts before sending to DLQ
      dlq:
        suffix: .DLT # Dead Letter Topic suffix (e.g., bank-events.DLT)
  consumer:
    idempotency:
      processing-ttl-seconds: 60 # Short TTL for crash recovery (1 minute)
      processed-ttl-minutes: 10 # Long TTL for duplicate prevention (10 minutes)
  cache:
    ttl:
      accounts: 300 # Cache TTL for account data in seconds (5 minutes)
      transactions: 180 # Cache TTL for transaction data in seconds (3 minutes)
      statistics: 600 # Cache TTL for statistics data in seconds (10 minutes)
  query:
    max-page-size: 100 # Maximum page size for pagination in query results
    default-page-size: 20 # Default page size for pagination in query results

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# Logging Configuration
logging:
  level:
    root: INFO
    com.alaeldin.bank_query_service: DEBUG
    org.springframework.kafka: INFO
    org.mongodb.driver: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
