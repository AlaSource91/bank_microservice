spring:
  profiles:
    active: local

  # Datasource Configuration - Docker Profile
  datasource:
    url: jdbc:mysql://mysql:3306/bank_simulator_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: bank_user
    password: bank_password123
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA Configuration
  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  # Redis Configuration - Docker
  redis:
    host: redis
    port: 6379
    timeout: 2000ms
    jedis:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms

  # Flyway Configuration
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  # Kafka Configuration - Docker Profile
  kafka:
    bootstrap-servers: kafka:29092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      batch-size: 16384
      linger-ms: 5
      buffer-memory: 33554432
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
        request.timeout.ms: 30000
        delivery.timeout.ms: 120000
        max.block.ms: 10000
        connections.max.idle.ms: 600000
        reconnect.backoff.ms: 50
        retry.backoff.ms: 100
    consumer:
      group-id: bank-simulator-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest

  # Task Execution Configuration
  task:
    execution:
      pool:
        size: 2

server:
  port: 8081

# Eureka Configuration - Disabled for Docker
eureka:
  client:
    enabled: false

# Application-specific Configuration - Docker
app:
  kafka:
    topic:
      transaction-events:   bank.transaction.events
      account-events:       bank.account.events
      ledger-events:        bank.ledger.events
      saga-events:          bank.saga.events
      debit-events:         bank.debit.events
      credit-events:        bank.credit.events
      compensation-events:  bank.compensation.events
  outbox:
    batch-size: 20
    max-retries: 3
    cleanup-days: 7
    stale-threshold: 30
    publish-timeout-seconds: 30
    poll-interval-ms: 10000

# Logging Configuration for Docker
logging:
  level:
    com.alaeldin.bank_simulator_service.job.OutboxPublisher: INFO
    org.springframework.kafka: WARN
    org.apache.kafka: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
