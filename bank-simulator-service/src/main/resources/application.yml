spring:
  application:
    name: bank-simulator-service
  datasource:
    url: jdbc:mysql://localhost:3306/bank_simulator_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username:  bank_user
    password:  bank_password123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.MySQL8Dialect
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  redis:
    host: localhost
    port: 6379
    timeout: 2000ms
    password: ""
    database: 0
    jedis:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms

  # Flyway Configuration
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 5051

# Eureka Configuration - Disabled for standalone development
eureka:
  client:
    enabled: false

