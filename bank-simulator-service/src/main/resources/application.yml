logging:
  level:
    org.flywaydb: DEBUG
    org.flywaydb.core.internal.database.mysql: DEBUG
    org.flywaydb.core.internal.command.DbMigrate: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

cache:
  ttl:
    account-balance: 300        #5 minutes
    transaction: 600             #10 minutes
    account-info: 900            #15 minutes
  idempotency:
    ttl: 86400 #24 hours in seconds
    max-entries: 1000000
    eviction-policy: LRU
    Key-pattern: "idempotency:*"

# Distributed Locking Configuration
lock:
  timeout-minutes: 5           # Lock expiration timeout in minutes
  cleanup-interval-ms: 120000   # Cleanup scheduler interval (2 minutes)
  cleanup-initial-delay-ms: 60000  # Initial delay before first cleanup (1 minute)
